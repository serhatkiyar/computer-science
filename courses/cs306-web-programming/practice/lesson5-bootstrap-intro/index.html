<!doctype html>
<html lang="tr">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Merhaba Bootstrap!</title>

    <link href="./bootstrap/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
  </head>

  <body>

    <div class="container-md bg-success bg-gradient text-center py-3 my-5 text-white">

      <h1 class="my-3 pd-3">Hello, World!</h1>

      <div class="row bg-dark-subtle py-3 my-3">
          <div class="col-sm-12 col-md-6 col-lg-4 bg-danger">ilk sütun</div>
          <div class="col-sm-12 col-md-6 col-lg-4 bg-primary">ikinci sütun</div>
          <div class="col-sm-12 col-md-6 col-lg-4 bg-info">üçüncü sütun</div>
      </div>
      
      <br>

      <div class="row bg-dark-subtle py-3 my-3">
          <div class="col-6 col-md-4 bg-danger">.col-6 .col-md-4</div>
          <div class="col-6 col-md-4 bg-primary">.col-6 .col-md-4</div>
          <div class="col-6 col-md-4 bg-info">.col-6 .col-md-4</div>
      </div>

      <br>

      <div class="row bg-dark-subtle py-3 my-3 justify-content-evenly">
          <div class="col-5 col-md-3 bg-danger">.col-6 .col-md-4</div>
          <div class="col-5 col-md-3 bg-primary">.col-6 .col-md-4</div>
          <div class="col-5 col-md-3 bg-info">.col-6 .col-md-4</div>
      </div>


      <br>

  <!--                              Ekstra                              -->
      <div class="row bg-dark-subtle py-3 my-3">
          <div class="col-sm-12 col-md-6 col-lg-4 bg-danger">
            <select class="form-select" aria-label="Default select example">
              <option selected>Open this select menu</option>
              <option value="1">One</option>
              <option value="2">Two</option>
              <option value="3">Three</option>
            </select>
          </div>

          <div class="col-sm-12 col-md-6 col-lg-4 bg-primary">
            <div class="form-check">
              <input class="form-check-input" type="checkbox" value="" id="checkChecked" checked>
              <label class="form-check-label" for="checkChecked">
                Checked checkbox
              </label>
            </div>
          </div>
          
          <div class="col-sm-12 col-md-6 col-lg-4 bg-info">
            <label for="range1" class="form-label">Example range</label>
            <input type="range" class="form-range" id="range1">
          </div>

      </div>
 <!-- ___________________________________________________________________ -->

    </div>



    
    
    <script src="./bootstrap/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
  </body>
</html>
